<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Laporan Penyuluh Pertanian</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body { font-family: Arial; background-color: #f4f4f4; padding: 20px; }
        .container { background: white; padding: 20px; border-radius: 8px; max-width: 800px; margin: auto; }
        .header { background-color: #c5d8b6; padding: 15px; text-align: center; font-weight: bold; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #333; padding: 8px; text-align: center; }
        th { background-color: #c5d8b6; }
        .btn-add { background-color: #1e5bb8; color: white; width: 100%; padding: 10px; border: none; margin-top: 10px; cursor: pointer; }
        .btn-pdf { background-color: #1b5e20; color: white; width: 100%; padding: 10px; border: none; margin-top: 5px; cursor: pointer; }
        input[type="text"], input[type="date"] { width: 90%; padding: 5px; }
    </style>
</head>
<body>

<div class="container" id="laporan-area">
    <div class="header">
        LAPORAN PENDERASAN INFORMASI DAN PEMBANGUNAN PERTANIAN <br> TAHUN 2026
    </div>

    <div style="margin-bottom: 20px;">
        <label>Nama Penyuluh: </label> <input type="text" id="nama"><br>
        <label>Wilayah Binaan: </label> <input type="text" id="wilayah">
    </div>

    <table id="tabelLaporan">
        <thead>
            <tr>
                <th rowspan="2">TANGGAL</th>
                <th rowspan="2">JUDUL KONTEN</th>
                <th colspan="3">EVIDEN</th>
            </tr>
            <tr>
                <th>LIKE</th>
                <th>COMMENT</th>
                <th>SHARE</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td><input type="date"></td>
                <td><input type="text"></td>
                <td><input type="file"></td>
                <td><input type="file"></td>
                <td><input type="file"></td>
            </tr>
        </tbody>
    </table>
</div>

<button class="btn-add" onclick="tambahBaris()">+ Tambah Baris</button>
<button class="btn-pdf" onclick="exportPDF()">EXPORT PDF</button>

<script>
    function tambahBaris() {
        const table = document.getElementById("tabelLaporan").getElementsByTagName('tbody')[0];
        const newRow = table.insertRow();
        newRow.innerHTML = `
            <td><input type="date"></td>
            <td><input type="text"></td>
            <td><input type="file"></td>
            <td><input type="file"></td>
            <td><input type="file"></td>
        `;
    }

    function exportPDF() {
        const element = document.getElementById('laporan-area');
        html2pdf().from(element).save('Laporan_Pertanian.pdf');
    }
</script>

</body>
</html>
